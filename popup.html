<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GPT-Monitor</title>
    <style>
        * { box-sizing: border-box; }
        body {
            width: 340px;
            padding: 12px 16px;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            background: #1e1e2f;
            color: #cdd6f4;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #313244;
            padding-bottom: 10px;
        }
        .header h3 { margin: 0; font-size: 15px; color: #89b4fa; }
        .history { max-height: 260px; overflow-y: auto; }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #313244;
        }
        .actions button {
            flex: 1;
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            background: #313244;
            color: #cdd6f4;
            transition: background 0.2s;
        }
        .actions button:hover { background: #45475a; }
        .actions button.danger { background: #f38ba8; color: #1e1e2f; }
        .actions button.danger:hover { background: #eba0ac; }
        .msg-count { font-weight: 600; }
        .msg-count.safe { color: #a6e3a1; }
        .msg-count.warn { color: #f9e2af; }
        .msg-count.danger { color: #f38ba8; }
        .info-btn {
            cursor: pointer;
            font-size: 16px;
            color: #6c7086;
            transition: color 0.2s;
            line-height: 1;
            user-select: none;
        }
        .info-btn:hover { color: #89b4fa; }
        .info-section {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #313244;
        }
        .info-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .info-label { color: #a6adc8; font-size: 12px; }
        .info-detail { color: #cdd6f4; }
        .info-warn { color: #f38ba8; font-weight: 500; }
        .highlight { color: #f9e2af; }
        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-track { background: #313244; border-radius: 4px; }
        .history::-webkit-scrollbar-thumb { background: #6c7086; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h3>🐱GPT-Monitor</h3>
        <span class="info-btn" id="infoBtn">ⓘ</span>
    </div>

    <div id="mainPanel">
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #313244;align-items:flex-start;">
            <div id="currentModelCard"></div>
            <div id="rightStats"></div>
        </div>
        <div id="recoveryPrediction"></div>
        <div style="color:#585b70;font-size:11px;padding:6px 0;">模型切换历史</div>
        <div class="history" id="historyList">
            <div style="padding:8px 0;color:#6c7086;text-align:center;font-size:12px;">暂无切换记录</div>
        </div>
        <div class="actions">
            <button id="testBtn" style="flex:1;padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;background:#89b4fa;color:#1e1e2f;">🔬 测试</button>
            <button id="clearHistoryBtn">🗑️ 清除监控数据</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
